<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raiss Live - مباريات اليوم بث مباشر</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

    <header class="hero-bg text-white py-16 px-4 text-center relative overflow-hidden">
        <div class="absolute top-4 left-4 flex gap-2">
            <button class="bg-white/20 hover:bg-white/30 px-4 py-1 rounded-full text-sm transition">بث مباشر مجاني</button>
        </div>
        
        <h1 class="text-4xl md:text-5xl font-bold mb-4 mt-8">Raiss Live – مباريات اليوم بث مباشر</h1>
        <p class="text-lg md:text-xl mb-8 opacity-90">شاهد مباريات كرة القدم بث مباشر مجاني HD - بدون اشتراك</p>
        
        <div class="flex flex-wrap justify-center gap-3">
            <span class="bg-white/10 border border-white/30 px-4 py-2 rounded-full text-sm">بدون تسجيل</span>
            <span class="bg-white/10 border border-white/30 px-4 py-2 rounded-full text-sm">بث مجاني HD</span>
        </div>
    </header>

    <main class="container mx-auto px-4 py-10">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800" id="current-date">مباريات اليوم</h2>
            <span class="text-sm text-gray-500">يتحدث تلقائياً</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 hover:shadow-lg transition">
                <div class="p-4 flex justify-between items-center relative">
                    <span class="absolute top-2 left-2 text-xs text-red-600 flex items-center gap-1">
                        <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> مباشر
                    </span>
                    <div class="flex flex-col items-center w-1/3 mt-4">
                        <img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg" alt="Real Madrid" class="w-12 h-12 mb-2">
                        <span class="font-bold text-sm text-center">ريال مدريد</span>
                    </div>
                    <div class="w-1/3 text-center mt-4">
                        <span class="text-2xl font-bold text-gray-800">2 - 0</span>
                    </div>
                    <div class="flex flex-col items-center w-1/3 mt-4">
                        <img src="https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg" alt="Man City" class="w-12 h-12 mb-2">
                        <span class="font-bold text-sm text-center">مانشستر سيتي</span>
                    </div>
                </div>
                <a href="#" class="block bg-red-700 text-white text-center py-3 font-bold hover:bg-red-800 transition">
                    ▶ شاهد على Raiss Live
                </a>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
